<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />

    <!-- Primary Meta -->
    <title>Js-Grw-Up — Co-parenting App for Separated Parents</title>
    <meta name="description" content="Js-Grw-Up is the private co-parenting app for separated parents. Share a calendar, message safely, log incidents, track expenses and export court-ready records — all in one place." />
    <meta name="keywords" content="co-parenting app, co parenting, shared custody app, separated parents app, child custody calendar, co-parent messaging, parenting plan app, court records app, UK co-parenting, family app" />
    <meta name="author" content="Js-Grw-Up" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://js-grw-up.com/" />

    <!-- Theme -->
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="light dark" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Js-Grw-Up" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Js-Grw-Up" />
    <meta property="og:title" content="Js-Grw-Up — Co-parenting App for Separated Parents" />
    <meta property="og:description" content="Private messaging, shared calendar, incident reports, expense tracking and court-ready PDF export. The co-parenting app built for the kids." />
    <meta property="og:url" content="https://js-grw-up.com/" />
    <meta property="og:image" content="https://js-grw-up.com/icons/icon-512x512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Js-Grw-Up — Co-parenting App" />
    <meta name="twitter:description" content="Private messaging, shared calendar, incident reports and court-ready records for separated parents." />
    <meta name="twitter:image" content="https://js-grw-up.com/icons/icon-512x512.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Js-Grw-Up",
      "alternateName": "Just Grow Up Co-Parenting App",
      "applicationCategory": "LifestyleApplication",
      "operatingSystem": "Web, Android, iOS",
      "url": "https://js-grw-up.com",
      "description": "Js-Grw-Up is a private co-parenting platform for separated parents. Features include secure messaging, shared calendar, incident reports, expense tracking, daily logs, and court-ready PDF export.",
      "screenshot": "https://js-grw-up.com/icons/icon-512x512.png",
      "offers": [
        {
          "@type": "Offer",
          "name": "Free",
          "price": "0",
          "priceCurrency": "GBP",
          "description": "Messaging, shared calendar and requests"
        },
        {
          "@type": "Offer",
          "name": "Premium",
          "price": "5",
          "priceCurrency": "GBP",
          "priceSpecification": {
            "@type": "UnitPriceSpecification",
            "price": "5",
            "priceCurrency": "GBP",
            "unitCode": "MON"
          },
          "description": "Full access including incident reports, expense tracking, PDF export and Google Calendar sync"
        }
      ],
      "featureList": [
        "Private co-parent messaging",
        "Shared family calendar",
        "Incident reporting",
        "Expense and receipt tracking",
        "Daily logs",
        "Progress tracking",
        "Co-parenting rules",
        "Court-ready PDF export",
        "Google Calendar sync",
        "Real-time updates"
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "5",
        "ratingCount": "1"
      }
    }
    </script>

    <!-- Prevent zoom on input focus (iOS) -->
    <style>
      input, select, textarea { font-size: 16px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
