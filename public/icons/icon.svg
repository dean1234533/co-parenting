<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#7c3aed"/>

  <!-- SMALL CHILD (left) -->
  <circle cx="110" cy="295" r="28" fill="white"/>
  <circle cx="100" cy="288" r="4" fill="#7c3aed"/>
  <circle cx="120" cy="288" r="4" fill="#7c3aed"/>
  <path d="M100 300 Q110 312 120 300" stroke="#7c3aed" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M110 323 L110 390" stroke="white" stroke-width="22" stroke-linecap="round"/>
  <path d="M110 390 L90 440" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <path d="M110 390 L130 440" stroke="white" stroke-width="16" stroke-linecap="round"/>

  <!-- TEEN (middle, taller) -->
  <circle cx="256" cy="248" r="36" fill="white"/>
  <circle cx="244" cy="240" r="5" fill="#7c3aed"/>
  <circle cx="268" cy="240" r="5" fill="#7c3aed"/>
  <path d="M242 258 Q256 272 270 258" stroke="#7c3aed" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M256 284 L256 390" stroke="white" stroke-width="28" stroke-linecap="round"/>
  <path d="M256 390 L232 445" stroke="white" stroke-width="20" stroke-linecap="round"/>
  <path d="M256 390 L280 445" stroke="white" stroke-width="20" stroke-linecap="round"/>

  <!-- ADULT (right, tallest) -->
  <circle cx="400" cy="175" r="46" fill="white"/>
  <circle cx="386" cy="166" r="6" fill="#7c3aed"/>
  <circle cx="414" cy="166" r="6" fill="#7c3aed"/>
  <path d="M384 187 Q400 203 416 187" stroke="#7c3aed" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M400 221 L400 390" stroke="white" stroke-width="36" stroke-linecap="round"/>
  <path d="M400 390 L372 448" stroke="white" stroke-width="24" stroke-linecap="round"/>
  <path d="M400 390 L428 448" stroke="white" stroke-width="24" stroke-linecap="round"/>

  <!-- Arrow line under feet showing progression -->
  <path d="M82 460 L450 460" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  <path d="M435 448 L452 460 L435 472" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
</svg>
