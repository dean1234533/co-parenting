<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#7c3aed"/>

  <!-- PARENT (left, taller) -->
  <!-- Head -->
