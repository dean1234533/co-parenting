<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#7c3aed"/>

  <!-- Peace symbol circle (ring) -->
  <circle cx="256" cy="240" r="160" fill="none" stroke="white" stroke-width="36"/>

  <!-- Vertical line (top to bottom through circle) -->
  <line x1="256" y1="80" x2="256" y2="400" stroke="white" stroke-width="36" stroke-linecap="round"/>

  <!-- Bottom left diagonal -->
  <line x1="256" y1="400" x2="143" y2="307" stroke="white" stroke-width="36" stroke-linecap="round"/>

  <!-- Bottom right diagonal -->
  <line x1="256" y1="400" x2="369" y2="307" stroke="white" stroke-width="36" stroke-linecap="round"/>
</svg>
