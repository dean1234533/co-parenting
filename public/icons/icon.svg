<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#7c3aed"/>

  <!-- Fist / closed hand body -->
  <rect x="155" y="270" width="210" height="175" rx="50" fill="white"/>

  <!-- Index finger only pointing straight up -->
  <rect x="210" y="95" width="75" height="205" rx="37" fill="white"/>

  <!-- Knuckle line across fist top -->
  <rect x="155" y="268" width="210" height="30" rx="15" fill="white"/>

  <!-- Thumb tucked to the left side -->
  <path d="M155 310 Q108 295 105 340 Q103 375 145 385 L155 385 Z" fill="white"/>

  <!-- Small upward arrow tip above finger -->
  <polygon points="247,58 222,95 272,95" fill="white" opacity="0.6"/>
</svg>
