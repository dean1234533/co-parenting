<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#7c3aed"/>

  <!-- Stem -->
  <rect x="242" y="200" width="28" height="180" rx="14" fill="white"/>

  <!-- Left leaf — curves outward then back to stem -->
  <path d="M256 290
    C256 290 180 270 152 210
    C140 185 155 155 180 158
    C210 162 240 195 256 230
    Z"
    fill="white" opacity="0.95"/>

  <!-- Right leaf — mirror -->
  <path d="M256 290
    C256 290 332 270 360 210
    C372 185 357 155 332 158
    C302 162 272 195 256 230
    Z"
    fill="white" opacity="0.95"/>

  <!-- Star / growth point at top -->
  <circle cx="256" cy="185" r="28" fill="white"/>
  <circle cx="256" cy="185" r="16" fill="#7c3aed"/>

  <!-- Two small root dots at base — two parents -->
  <circle cx="210" cy="390" r="18" fill="white" opacity="0.7"/>
  <circle cx="302" cy="390" r="18" fill="white" opacity="0.7"/>
</svg>
