  <circle cx="196" cy="143" r="5" fill="#7c3aed"/>
  <!-- Body -->
  <path d="M185 192 L185 320" stroke="white" stroke-width="36" stroke-linecap="round"/>
  <!-- Legs -->
  <path d="M185 320 L158 400" stroke="white" stroke-width="24" stroke-linecap="round"/>
  <path d="M185 320 L212 400" stroke="white" stroke-width="24" stroke-linecap="round"/>

