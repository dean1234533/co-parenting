<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#7c3aed"/>

  <!-- Palm / fist base -->
  <rect x="148" y="295" width="216" height="160" rx="50" fill="white"/>

  <!-- Index finger (left, angled slightly left) -->
  <rect x="172" y="95" width="72" height="225" rx="36" fill="white" transform="rotate(-8 208 210)"/>

  <!-- Middle finger (right, angled slightly right) -->
  <rect x="268" y="95" width="72" height="225" rx="36" fill="white" transform="rotate(8 304 210)"/>

  <!-- Thumb tucked left -->
  <path d="M148 320 Q100 300 97 348 Q95 385 138 393 L148 393 Z" fill="white"/>

  <!-- Knuckle bridge connecting fingers to palm -->
  <rect x="148" y="293" width="216" height="35" rx="17" fill="white"/>
</svg>
