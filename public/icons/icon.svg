  <!-- Legs -->
  <path d="M310 340 L288 400" stroke="white" stroke-width="20" stroke-linecap="round"/>
  <path d="M310 340 L332 400" stroke="white" stroke-width="20" stroke-linecap="round"/>

  <!-- Child arm up toward parent -->
